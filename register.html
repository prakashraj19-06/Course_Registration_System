<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Registration System - Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="register.css">
</head>
<body class="register-page">
    <nav class="navbar">
        <a href="index.html" class="brand">Course Registration System</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="register.html" class="active">Register</a>
            <a href="enrolled.html">Enrolled</a>
            <a href="courses.html">Courses</a>
        </div>
        <button class="profile-btn">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </button>
    </nav>

    <div class="split-layout">
        <div class="split-left">
            <div class="auth-form">
                <div class="brand auth-brand">Course Registration</div>
                <h1>WELCOME BACK!</h1>
                <p>Don't have an account, <a href="#">Sign up</a></p>
                
                <form action="http://localhost:8080/courses/register" method="post">
                    <div class="form-group" action="http://localhost:8080/courses/register" method="post">
                        <label class="form-label">NAME</label>
                        <input type="text" class="form-input" placeholder="enter name" name="name" required>
                    </div>
                    
                    <div class="form-group" action="http://localhost:8080/courses/register" method="post">
                        <label class="form-label">EMAIL ID</label>
                        <input type="text" class="form-input" placeholder="example@email.com" name="emailId" required>
                    </div>

                    <div class="form-group" action="http://localhost:8080/courses/register" method="post">
                        <label class="form-label">COURSE</label>
                        <select class="form-input course-select" id="course-option" name="courseName" required>
                               <option value="">Select a course</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-primary submit-btn">
                        Sign In
                    </button>
                </form>
            </div>
        </div>
        <div class="split-right">
            <div class="avatar-frame">
                <img src="panda_avatar.png" alt="Panda Avatar" class="avatar-image">
                <div class="avatar-actions">
                    <button class="avatar-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="avatar-svg">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418" />
                        </svg>
                    </button>
                    <button class="avatar-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="avatar-svg">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.985V5.653z" />
                        </svg>
                    </button>
                    <button class="avatar-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="avatar-svg">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186l9.566-5.314m-9.566 7.5l9.566 5.314m0 0a2.25 2.25 0 103.935 2.186 2.25 2.25 0 00-3.935-2.186zm0-12.814a2.25 2.25 0 103.933-2.185 2.25 2.25 0 00-3.933 2.185z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <footer class="register-footer">
        <div>&copy; 2024 Course Registration System. All rights reserved.</div>
        <div class="footer-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="#">Support</a>
            <a href="#">Community</a>
        </div>
    </footer>
    <script src="register.js"></script>
</body>
</html>
